#!/bin/bash
#===============================================================================
# LDAP 统一配置文件
# 所有 LDAP 管理脚本引用此文件获取配置：
#   source "$(dirname "$0")/../config/ldap.conf"
#   或：source /opt/ldap/config/ldap.conf
#
# 基于 ldap.20210907.tar.gz 基线包优化
#===============================================================================

#------------------------------------------------------------------------------
# LDAP 域配置
#------------------------------------------------------------------------------
# 在使用任何脚本前配置以下变量，或通过环境变量 export。
# 如果 LDAP_ROOTPW 为空，脚本将交互式提示输入密码。
#------------------------------------------------------------------------------

export LDAP_DC1="${LDAP_DC1:-example}"
export LDAP_DC2="${LDAP_DC2:-com}"
export LDAP_SUFFIX="${LDAP_SUFFIX:-dc=${LDAP_DC1},dc=${LDAP_DC2}}"
export LDAP_ROOTDN="${LDAP_ROOTDN:-cn=Manager,${LDAP_SUFFIX}}"
export LDAP_ROOTPW="${LDAP_ROOTPW:-}"            # 空则运行时提示输入

#------------------------------------------------------------------------------
# 只读认证账号（基于新基线包新增）
#------------------------------------------------------------------------------
export LDAP_RO="${LDAP_RO:-readonly}"
export LDAP_RO_DN="${LDAP_RO_DN:-cn=${LDAP_RO},${LDAP_SUFFIX}}"
export LDAP_RO_PW="${LDAP_RO_PW:-}"              # 空则运行时提示输入

#------------------------------------------------------------------------------
# LDAP 服务器节点（多主镜像模式，FQDN）
#------------------------------------------------------------------------------
export LDAP_MASTER1="${LDAP_MASTER1:-ldap01.example.com}"
export LDAP_MASTER2="${LDAP_MASTER2:-ldap02.example.com}"
export LDAP_SERVERID1="${LDAP_SERVERID1:-1}"
export LDAP_SERVERID2="${LDAP_SERVERID2:-2}"

#------------------------------------------------------------------------------
# LDAP 连接设置
#------------------------------------------------------------------------------
export LDAP_PORT="${LDAP_PORT:-389}"
export LDAPS_PORT="${LDAPS_PORT:-636}"
export LDAP_URI="${LDAP_URI:-ldap://${LDAP_MASTER1} ldap://${LDAP_MASTER2}}"
export LDAPS_URI="${LDAPS_URI:-ldaps://${LDAP_MASTER1} ldaps://${LDAP_MASTER2}}"

#------------------------------------------------------------------------------
# TLS / LDAPS 设置
#------------------------------------------------------------------------------
export LDAP_TLS_ENABLED="${LDAP_TLS_ENABLED:-yes}"   # yes | no
export LDAP_TLS_CACERT="${LDAP_TLS_CACERT:-/etc/openldap/certs/ca.crt}"
export LDAP_TLS_CERT="${LDAP_TLS_CERT:-/etc/openldap/certs/server.crt}"
export LDAP_TLS_KEY="${LDAP_TLS_KEY:-/etc/openldap/certs/server.key}"
export LDAP_TLS_CIPHERS="${LDAP_TLS_CIPHERS:-HIGH:!aNULL:!eNULL:!SSLv2:!SSLv3}"
export LDAP_TLS_PROTOCOL_MIN="${LDAP_TLS_PROTOCOL_MIN:-3.3}"  # TLS 1.2+
export LDAP_TLS_REQCERT="${LDAP_TLS_REQCERT:-demand}"

#------------------------------------------------------------------------------
# DIT（目录信息树）结构
#------------------------------------------------------------------------------
export LDAP_USER_BASE="${LDAP_USER_BASE:-ou=People,${LDAP_SUFFIX}}"
export LDAP_GROUP_BASE="${LDAP_GROUP_BASE:-ou=Group,${LDAP_SUFFIX}}"

#------------------------------------------------------------------------------
# 默认用户设置（基于新包：min uid/gid=5000）
#------------------------------------------------------------------------------
export DEFAULT_LOGIN_SHELL="${DEFAULT_LOGIN_SHELL:-/bin/csh}"
export DEFAULT_HOME_BASE="${DEFAULT_HOME_BASE:-/share/home}"
export DEFAULT_GID_MIN="${DEFAULT_GID_MIN:-5000}"
export DEFAULT_UID_MIN="${DEFAULT_UID_MIN:-5000}"

#------------------------------------------------------------------------------
# 密码策略（ShadowAccount + ppolicy）
#------------------------------------------------------------------------------
export PASSWORD_MIN_LENGTH="${PASSWORD_MIN_LENGTH:-8}"
export SHADOW_MAX_DAYS="${SHADOW_MAX_DAYS:-90}"           # 密码有效期（天）
export SHADOW_MIN_DAYS="${SHADOW_MIN_DAYS:-0}"            # 最小修改间隔
export SHADOW_WARN_DAYS="${SHADOW_WARN_DAYS:-7}"          # 过期前警告天数
export SHADOW_INACTIVE="${SHADOW_INACTIVE:-30}"           # 过期后宽限天数

# ppolicy（OpenLDAP 强密码策略 overlay）
export PPOLICY_DEFAULT_DN="${PPOLICY_DEFAULT_DN:-cn=default,${LDAP_SUFFIX}}"
export PPOLICY_MIN_LENGTH="${PPOLICY_MIN_LENGTH:-8}"
export PPOLICY_MAX_FAILURE="${PPOLICY_MAX_FAILURE:-5}"
export PPOLICY_LOCKOUT_DURATION="${PPOLICY_LOCKOUT_DURATION:-1800}"
export PPOLICY_HISTORY="${PPOLICY_HISTORY:-3}"
export PPOLICY_MAX_AGE="${PPOLICY_MAX_AGE:-7776000}"
export PPOLICY_EXPIRE_WARNING="${PPOLICY_EXPIRE_WARNING:-604800}"
export PPOLICY_GRACE_LOGINS="${PPOLICY_GRACE_LOGINS:-5}"

#------------------------------------------------------------------------------
# 日志
#------------------------------------------------------------------------------
export LDAP_LOG_TAG="${LDAP_LOG_TAG:-ldap-admin}"
export LDAP_LOG_FACILITY="${LDAP_LOG_FACILITY:-local0}"

#------------------------------------------------------------------------------
# 脚本行为
#------------------------------------------------------------------------------
export LDAP_CONNECT_TIMEOUT="${LDAP_CONNECT_TIMEOUT:-5}"
export LDAP_RETRY_COUNT="${LDAP_RETRY_COUNT:-1}"

#------------------------------------------------------------------------------
# 公共辅助函数
#------------------------------------------------------------------------------

# 检测 RHEL/CentOS 版本
# 返回：7、8、9 或 0（未知）
detect_os() {
    if [ -f /etc/redhat-release ]; then
        local ver
        ver=$(rpm -q --qf "%{VERSION}" "$(rpm -q --whatprovides redhat-release)" 2>/dev/null \
              || grep -oP 'release\s+\K\d+' /etc/redhat-release 2>/dev/null \
              || echo "0")
        echo "${ver%%.*}"
    else
        echo "0"
    fi
}

# 如果环境变量未设置，则提示输入 LDAP 管理员密码
ensure_rootpw() {
    if [ -z "${LDAP_ROOTPW:-}" ]; then
        echo -n "请输入 LDAP 管理员密码 (cn=Manager): " >&2
        read -rs LDAP_ROOTPW
        echo "" >&2
        if [ -z "${LDAP_ROOTPW}" ]; then
            echo "错误: 需要 LDAP 管理员密码。" >&2
            exit 1
        fi
    fi
}

# 如果环境变量未设置，则提示输入只读账号密码
ensure_ropw() {
    if [ -z "${LDAP_RO_PW:-}" ]; then
        echo -n "请输入 LDAP 只读账号密码 (cn=readonly): " >&2
        read -rs LDAP_RO_PW
        echo "" >&2
        if [ -z "${LDAP_RO_PW}" ]; then
            echo "错误: 需要只读账号密码。" >&2
            exit 1
        fi
    fi
}

# 构建 ldap 命令的 TLS 选项
# 用法：tls_opt="$(ldap_tls_opts)"
ldap_tls_opts() {
    if [ "${LDAP_TLS_ENABLED:-yes}" = "yes" ]; then
        echo "-H ldaps://${LDAP_MASTER1}:${LDAPS_PORT} -Z"
    else
        echo "-H ldap://${LDAP_MASTER1}:${LDAP_PORT}"
    fi
}

# 计算今天的 shadowLastChange 值（从 epoch 开始的天数）
shadow_today() {
    echo $(( $(date +%s) / 86400 ))
}

# 将日期字符串（YYYY-MM-DD）转换为 epoch 天数
date_to_epoch_days() {
    local date_str="$1"
    local epoch
    epoch=$(date -d "${date_str}" +%s 2>/dev/null || echo "")
    [ -z "${epoch}" ] && { echo "错误: 无效的日期格式 '${date_str}'，请使用 YYYY-MM-DD。" >&2; return 1; }
    echo $(( epoch / 86400 ))
}

# 记录信息日志到 syslog
log_info() {
    logger -t "${LDAP_LOG_TAG}" -p "${LDAP_LOG_FACILITY}.info" -- "$1"
}

# 记录错误日志到 syslog
log_error() {
    logger -t "${LDAP_LOG_TAG}" -p "${LDAP_LOG_FACILITY}.err" -- "$1"
}

# 校验必需的配置变量已设置且非空
# 用法：validate_config "LDAP_SUFFIX" "LDAP_ROOTDN"
validate_config() {
    local missing=()
    for var in "$@"; do
        if [ -z "${!var:-}" ]; then
            missing+=("$var")
        fi
    done
    if [ ${#missing[@]} -gt 0 ]; then
        echo "错误: 以下必需配置变量未设置: ${missing[*]}" >&2
        echo "请在 config/ldap.conf 中配置或运行前 export 它们。" >&2
        exit 1
    fi
}

# 生成随机密码（默认10位，含大小写字母+数字+特殊字符）
# 用法：pass=$(random_password [长度])
random_password() {
    local len="${1:-10}"
    local pass=""
    while true; do
        pass="$(LC_ALL=C tr -dc 'A-Za-z0-9!@#$%' < /dev/urandom 2>/dev/null | head -c "$len")"
        # 确保至少包含大小写、数字、特殊字符各一个
        [[ "$pass" =~ [A-Z] ]] && [[ "$pass" =~ [a-z] ]] && [[ "$pass" =~ [0-9] ]] && [[ "$pass" =~ [\!\@\#\$\%] ]] && break
    done
    echo "${pass}"
}
