# LDAP 客户端 Ansible 部署 — 主机清单
#
# 分组说明：
#   [ldap-clients]     所有需要部署 LDAP 客户端的节点
#   [centos7]          CentOS 7.x 节点（nslcd 遗留或 SSSD 新装）
#   [rocky8]           Rocky 8.x / RHEL 8+ 节点（仅 SSSD）
#   [centos7-nslcd]    CentOS 7 存量 nslcd 节点
#   [centos7-sssd]     CentOS 7 SSSD 节点
#
# 主机变量（可选）：
#   ldap_client_mode=sssd|nslcd    强制指定客户端类型
#   ldap_ro_pw=xxx                 覆盖只读账号密码（敏感，建议用 vault）
#
# 用法：
#   测试单台：ansible-playbook -i inventory.ini deploy-ldap-client.yml -l test-node --check
#   执行单台：ansible-playbook -i inventory.ini deploy-ldap-client.yml -l test-node
#   批量执行：ansible-playbook -i inventory.ini deploy-ldap-client.yml -l ldap-clients
#   按组执行：ansible-playbook -i inventory.ini deploy-ldap-client.yml -l centos7-sssd
#   滚动更新：ansible-playbook -i inventory.ini deploy-ldap-client.yml --serial 10

#=============================================================================
# 待部署节点（按实际环境填充 IP 或主机名）
#=============================================================================

[ldap-clients:children]
centos7
rocky8

#-------------------------------------------------------------------------
# CentOS 7 节点
#-------------------------------------------------------------------------
[centos7]
# ETX 登录节点示例（替换为实际 IP/主机名）
# etlogin01  ansible_host=10.1.10.10  ldap_client_mode=sssd
# etlogin02  ansible_host=10.1.10.11  ldap_client_mode=sssd

# 存量 nslcd 节点示例
# compute01   ansible_host=10.1.20.1   ldap_client_mode=nslcd
# compute02   ansible_host=10.1.20.2   ldap_client_mode=nslcd

[centos7-nslcd]
# 手动将存量 nslcd 节点加入此组（部署后自动迁移到 centos7-sssd）
# compute01

[centos7-sssd]
# 手动将新装 SSSD 节点加入此组
# etlogin01

#-------------------------------------------------------------------------
# Rocky 8 / RHEL 8+ 节点
#-------------------------------------------------------------------------
[rocky8]
# 示例
# rockygpu01 ansible_host=10.1.30.1
# rockygpu02 ansible_host=10.1.30.2

#=============================================================================
# Ansible 控制节点配置
#=============================================================================
[ansible_control]
localhost ansible_connection=local
